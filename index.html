
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Style</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #2a2a2a;
      padding: 40px 20px;
    }
    
    h1 {
      text-align: center;
      font-size: 36px;
      font-weight: 300;
      margin-bottom: 50px;
      letter-spacing: 1px;
    }
    
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 40px;
      max-width: 2000px;
      margin: 0 auto;
    }
    
    .col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #999;
      font-weight: 600;
    }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      flex: 1;
      overflow-y: auto;
    }
    
    .item {
      cursor: pointer;
      aspect-ratio: 1/1.2;
      background: white;
      border: 2px solid transparent;
      border-radius: 4px;
      background-size: cover;
      background-position: center;
      position: relative;
      transition: all 0.2s;
      overflow: hidden;
    }
    
    .item:hover {
      border-color: #2a2a2a;
    }
    
    .item.active {
      border-color: #2a2a2a;
      box-shadow: inset 0 0 0 2px #2a2a2a;
    }
    
    .price {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: white;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 700;
      border-radius: 2px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 30px;
    }
    
    .model {
      width: 100%;
      aspect-ratio: 1/1.5;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 14px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
    }
    
    .model.loading {
      color: #2a2a2a;
    }
    
    .summary {
      width: 100%;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 30px;
      text-align: center;
    }
    
    .summary-item {
      font-size: 11px;
      color: #999;
      margin: 10px 0;
      line-height: 1.4;
    }
    
    .summary-price {
      font-size: 28px;
      font-weight: 300;
      color: #2a2a2a;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }
    
    .btn {
      width: 100%;
      background: #2a2a2a;
      color: white;
      border: none;
      padding: 14px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
    }
    
    .btn:hover:not(:disabled) {
      background: #1a1a1a;
    }
    
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>Your Style</h1>
  
  <div class="layout">
    <!-- LEFT: CLOSET -->
    <div class="col">
      <div class="title">Your Closet</div>
      <div class="grid" id="closet"></div>
    </div>
    
    <!-- CENTER: MODEL -->
    <div class="center">
      <div class="title">Your Outfit</div>
      <div class="model" id="model">Select items</div>
      <div class="summary">
        <div id="items"></div>
        <div class="summary-price" id="price">$0</div>
      </div>
      <button class="btn" id="btn" onclick="generate()" disabled>Generate</button>
    </div>
    
    <!-- RIGHT: NEW ARRIVALS -->
    <div class="col">
      <div class="title">New Arrivals</div>
      <div class="grid" id="new"></div>
    </div>
  </div>

  <script>
    const data = [
      { name: "HomeStretch™ Rib Kickback Pant", price: 68, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702612/HomeStretch_Rib_Kickback_Pant_-_rich_mocha_brown_aw5tb2.avif", new: false },
      { name: "Original Contour Ravish Top", price: 58, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702612/Original_Contour_Ravish_Top_-_rich_mocha_brown_xuapbv.avif", new: false },
      { name: "Heritage Merino Wool 1/4 Zip Hi-Hip Sweater", price: 138, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702612/Heritage_Merino_Wool_1_4_Zip_Hi-Hip_Sweater_-_heather_charcoal_tulhi1.avif", new: false },
      { name: "Olive Micro Skirt", price: 88, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702612/Olive_Micro_Skirt_-_heather_charcoal_v7sm4k.avif", new: false },
      { name: "Smooth Matter™ Tower Top", price: 48, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702607/Smooth_Matter_Tower_Top_-_black_vvalrp.avif", new: false },
      { name: "Wilfred Endnote Pant", price: 138, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702606/Wilfred_Endnote_Pant_-_black_xgxghh.avif", new: true },
      { name: "Wilfred Calligraphy Top", price: 98, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702606/Wilfred_Calligraphy_Top_-_black_bzqrey.avif", new: true },
      { name: "Serif Satin Camisole", price: 110, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702606/Serif_Satin_Camisole_-_black_ivqnhs.avif", new: true },
      { name: "Henrietta Satin Skirt", price: 148, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702605/Henrietta_Satin_Skirt_-_rich_mocha_brown_black_tgrhuj.avif", new: true },
      { name: "Slip Satin Maxi Skirt", price: 98, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702605/Slip_Satin_Maxi_Skirt_-_matte_pearl_g1xct8.avif", new: true },
      { name: "Element Tube Top - (Re)ssential", price: 110, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702606/Element_Tube_Top_-_Re_ssential_-_rich_mocha_brown_rbhcug.avif", new: true },
      { name: "Element Tube Top - (Re)ssential", price: 110, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702605/Element_Tube_Top_-_Re_ssential_-_heather_dark_grey_zdaznx.avif", new: true },
      { name: "New Agency Pant - (Re)ssential", price: 148, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702605/New_Agency_Pant_-_Re_ssential_-_black_t1wibh.avif", new: true },
      { name: "New Agency Pant - (Re)ssential", price: 148, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702605/New_Agency_Pant_-_Re_ssential_-_heather_dark_grey_kvcpf4.avif", new: true },
      { name: "Denim Forum The '90s Iggy Lo-Rise Baggy Jean", price: 110, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702605/Denim_Forum_The_90s_Iggy_Lo-Rise_Baggy_Jean_-_7_yrs_bleu_taboo_rwmta2.avif", new: true },
      { name: "Whisper Halter Top - Crepette™", price: 98, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702604/Whisper_Halter_Top_-_Crepette_-_folio_brown_ku3ejx.avif", new: true },
      { name: "Rae Bomber - Leather", price: 598, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702604/Rae_Bomber_-_Leather_-_black_xt8asu.avif", new: true },
      { name: "Golightly Cardigan - Wonder Yarn", price: 118, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702604/Golightly_Cardigan_-_Wonder_Yarn_-_light_birch_dhfnvt.avif", new: true },
      { name: "Martini Satin Halter Blouse", price: 88, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702604/Martini_Satin_Halter_Blouse_-_dark_night_nay_n67qni.avif", new: true },
      { name: "Martini Satin Halter Blouse", price: 88, type: "top", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702604/Martini_Satin_Halter_Blouse_-_marmont_i7ipmk.avif", new: true },
      { name: "The Lodge Pant™ - Satin", price: 138, type: "bottom", img: "https://res.cloudinary.com/dy9gg97l0/image/upload/v1773702605/Element_Tube_Top_-_Re_ssential_-_heather_dark_grey_zdaznx.avif", new: true }
    ];

    let sel = { tops: [], bottoms: [] };

    function render() {
      const closet = data.filter(p => !p.new);
      const news = data.filter(p => p.new);
      
      document.getElementById('closet').innerHTML = closet.map(p => {
        const isSelected = sel[p.type === 'top' ? 'tops' : 'bottoms'].some(item => item.name === p.name);
        return `
        <div class="item ${isSelected ? 'active' : ''}" 
             style="background-image: url('${p.img}')"
             onclick="toggle('${p.name}', '${p.type}')">
          <div class="price">$${p.price}</div>
        </div>
      `}).join('');
      
      document.getElementById('new').innerHTML = news.map(p => {
        const isSelected = sel[p.type === 'top' ? 'tops' : 'bottoms'].some(item => item.name === p.name);
        return `
        <div class="item ${isSelected ? 'active' : ''}" 
             style="background-image: url('${p.img}')"
             onclick="toggle('${p.name}', '${p.type}')">
          <div class="price">$${p.price}</div>
        </div>
      `}).join('');
    }

    function toggle(name, type) {
      const p = data.find(x => x.name === name && x.type === type);
      const key = type === 'top' ? 'tops' : 'bottoms';
      const idx = sel[key].findIndex(x => x.name === name);
      
      if (idx > -1) {
        sel[key].splice(idx, 1);
      } else {
        sel[key].push(p);
      }
      
      update();
      render();
    }

    function update() {
      const items = [...sel.tops, ...sel.bottoms];
      const tot = items.reduce((s, i) => s + i.price, 0);
      
      document.getElementById('items').innerHTML = items.length 
        ? items.map(i => `<div class="summary-item">${i.name}</div>`).join('')
        : '<div class="summary-item">No items</div>';
      
      document.getElementById('price').textContent = `$${tot}`;
      document.getElementById('btn').disabled = items.length === 0;
    }

    async function generate() {
      const items = [...sel.tops, ...sel.bottoms];
      if (items.length === 0) return;

      const model = document.getElementById('model');
      const btn = document.getElementById('btn');
      
      model.textContent = 'Generating...';
      model.classList.add('loading');
      btn.disabled = true;

      try {
        const desc = items.map(i => i.name).join(', ');
        const response = await fetch('/.netlify/functions/generate-image', {
          method: 'POST',
          body: JSON.stringify({ outfitDescription: desc })
        });

        const result = await response.json();

        if (response.ok) {
          model.style.backgroundImage = `url('${result.url}')`;
          model.textContent = '';
          model.classList.remove('loading');
        } else {
          model.textContent = `Setup incomplete. Deploy generate-image.js first.`;
          console.log('Prompt:', desc);
        }
      } catch (error) {
        model.textContent = `Setup incomplete. Deploy generate-image.js first.`;
        console.log('Outfit:', items.map(i => i.name).join(', '));
      }

      btn.disabled = false;
    }

    render();
    update();
  </script>
</body>
</html>
